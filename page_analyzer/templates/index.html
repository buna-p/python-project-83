{% extends "layout.html" %}

{% block title %}Анализатор страниц{% endblock %}

{% block content %}
  <h1></h1>
  <div class="row">
    <div class="col-12 col-md-10 col-lg-8 mx-auto border rounded-3 bg-light p-5">
      <h1 class="display-3 fw-semibold">Анализатор страниц</h1>
      <p class="lead">Введите адрес страницы для анализа сайта на SEO-пригодность</p>
      <form action="{{ url_for('add_url') }}" method="post" class="d-flex justify-content-center">
        <label for="text" class="visually-hidden">Url для проверки</label>
        <input type="url" name="url" placeholder="https://www.example.com"value="" class="form-control form-control-lg" required>
        <button type="submit" class="btn btn-success btn-lg ms-3 px-5 text-uppercase mx-3">Проверить</button>
      </form>
    </div>
  </div>
{% endblock %}
